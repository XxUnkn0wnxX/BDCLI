# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# GoReleaser v2 configuration
version: 2

project_name: bdcli

# Before hook - runs before the build
before:
  hooks:
    - go mod tidy
    - go mod download
    - sh ./scripts/completions.sh

builds:
  - id: bdcli
    binary: bdcli
    main: ./main.go
    env:
      - CGO_ENABLED=0
      - MACOSX_DEPLOYMENT_TARGET=11.0
    goos:
      - darwin
    goarch:
      - amd64
    goamd64:
      - v1
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.CommitDate}}
    mod_timestamp: '{{ .CommitTimestamp }}'

# Our binaries are small, so we can skip UPX compression
# to save time and avoid potential issues with antivirus software.
# upx:
  # - enabled: true
    # compress: best
    # lzma: true
    # brute: true

archives:
  - formats: ["tar.gz"]
    name_template: '{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}_macos11'
    builds_info:
      mtime: "{{ .CommitDate }}"
    files:
      - src: README.md
        info:
          mtime: "{{ .CommitDate }}"
      - src: LICENSE
        info:
          mtime: "{{ .CommitDate }}"
      - src: completions/*
        info:
          mtime: "{{ .CommitDate }}"

checksum:
  name_template: "bdcli_checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"


changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
  groups:
    - title: 'Features'
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: 'Bug Fixes'
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: 'Others'
      order: 999


release:
  prerelease: auto
  mode: replace
  header: |
    ## BDCLI for macOS Big Sur on older Intel Macs {{ .Tag }}

    This fork publishes macOS Big Sur-compatible Intel Mac release assets only.
  footer: |
    **Full Changelog**: https://github.com/XxUnkn0wnxX/BDCLI/compare/{{ .PreviousTag }}...{{ .Tag }}

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).

git:
  ignore_tags:
    - 'nightly'
