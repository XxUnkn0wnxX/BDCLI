name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - 'main.go'
      - 'go.mod'
      - 'go.sum'
      - 'Taskfile.yml'
      - '.goreleaser.yaml'

jobs:
  checks:
    name: Checks
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.8'
          cache: true

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Run sanity checks and tests
        run: task ci

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m
