name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  macos-big-sur:
    name: macOS Big Sur CI
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.8'
          cache: true

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Run sanity checks and tests
        run: task ci

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

      - name: Build macOS 11 Intel binary
        env:
          CGO_ENABLED: "0"
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          mkdir -p dist
          GOOS=darwin GOARCH=amd64 GOAMD64=v1 go build -trimpath -o dist/bdcli-darwin-amd64-macos11 ./main.go
          ./dist/bdcli-darwin-amd64-macos11 version

      - name: Upload macOS 11 artifact
        uses: actions/upload-artifact@v4
        with:
          name: bdcli-darwin-amd64-macos11-snapshot
          path: dist/bdcli-darwin-amd64-macos11
