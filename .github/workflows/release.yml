name: Release

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - 'main.go'
      - 'go.mod'
      - 'go.sum'
      - 'Taskfile.yml'
      - '.goreleaser.yaml'

permissions:
  contents: write

jobs:
  release:
    name: macOS Big Sur Release
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.8'
          cache: true

      - name: Generate shell completions
        run: sh ./scripts/completions.sh

      - name: Build macOS 11 binary
        env:
          CGO_ENABLED: "0"
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${SHORT_SHA} -X main.commit=${SHORT_SHA} -X main.date=${BUILD_DATE}" \
            -o dist/bdcli-darwin-amd64-macos11 \
            ./main.go
          chmod +x dist/bdcli-darwin-amd64-macos11
          ls -l dist/bdcli-darwin-amd64-macos11

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: bdcli-darwin-amd64-macos11-${{ github.sha }}
          path: dist/bdcli-darwin-amd64-macos11

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          TAG="main-latest"
          TITLE="BDCLI macOS Big Sur Release (${SHORT_SHA})"

          git tag -f "$TAG" "${GITHUB_SHA}"
          git push origin "refs/tags/${TAG}" --force

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes
          fi

          gh release create "$TAG" dist/bdcli-darwin-amd64-macos11 \
            --target "${GITHUB_SHA}" \
            --title "$TITLE" \
            --notes "Latest rolling macOS Big Sur Intel release for commit ${GITHUB_SHA}."
