name: Release

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - 'main.go'
      - 'go.mod'
      - 'go.sum'
      - 'Taskfile.yml'
      - '.goreleaser.yaml'

permissions:
  actions: read

jobs:
  release:
    name: macOS Big Sur Commit Artifact
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.8'
          cache: true

      - name: Generate shell completions
        run: sh ./scripts/completions.sh

      - name: Build commit-named macOS 11 artifact
        env:
          CGO_ENABLED: "0"
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          mkdir -p dist/archive/completions
          SHORT_SHA="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${SHORT_SHA} -X main.commit=${SHORT_SHA} -X main.date=${BUILD_DATE}" \
            -o dist/archive/bdcli \
            ./main.go
          cp README.md LICENSE dist/archive/
          cp completions/* dist/archive/completions/
          tar -C dist/archive -czf "dist/bdcli_${SHORT_SHA}_darwin_amd64_macos11.tar.gz" .
          ls -l "dist/bdcli_${SHORT_SHA}_darwin_amd64_macos11.tar.gz"

      - name: Upload commit artifact
        uses: actions/upload-artifact@v4
        with:
          name: bdcli-darwin-amd64-macos11-${{ github.sha }}
          path: dist/bdcli_*_darwin_amd64_macos11.tar.gz
