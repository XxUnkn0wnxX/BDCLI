name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: macOS Big Sur Release
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.8'
          cache: true

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Run sanity checks and tests
        run: task ci

      - name: Run GoReleaser for macOS Big Sur
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: "11.0"
